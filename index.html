<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>With. AIワークショップ投票 受付終了</title>
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --line: #dbe4f0;
            --success-bg: #ecfdf5;
            --success-text: #047857;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background:
                radial-gradient(circle at top, rgba(59, 130, 246, 0.08), transparent 38%),
                var(--bg-color);
        }

        .container { max-width: 860px; margin: 0 auto; padding: 0 20px 64px; }

        .hero {
            background: linear-gradient(135deg, var(--primary), #0f172a);
            color: white;
            text-align: center;
            padding: 64px 20px 56px;
            border-radius: 0 0 30px 30px;
            margin-bottom: 36px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
        }

        .subtitle {
            display: inline-block;
            background: rgba(255, 255, 255, 0.12);
            padding: 5px 15px;
            border-radius: 999px;
            font-size: 0.9rem;
            margin-bottom: 14px;
            letter-spacing: 0.08em;
        }

        .hero h1 {
            font-size: 2.2rem;
            line-height: 1.35;
            margin-bottom: 12px;
        }

        .hero-copy {
            max-width: 620px;
            margin: 0 auto;
            opacity: 0.9;
            font-size: 0.98rem;
        }

        .section {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 34px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .closing-card {
            border: 1px solid #bbf7d0;
            background: linear-gradient(180deg, #f0fdf4 0%, #ffffff 100%);
        }

        .eyebrow {
            display: inline-block;
            background: var(--success-bg);
            color: var(--success-text);
            border-radius: 999px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            margin-bottom: 14px;
        }

        .closing-card h2 {
            color: var(--primary);
            font-size: 1.7rem;
            margin-bottom: 10px;
        }

        .closing-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-top: 22px;
        }

        .summary-box {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
        }

        .summary-box span {
            display: block;
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-bottom: 6px;
        }

        .summary-box strong {
            color: var(--primary);
            font-size: 1.35rem;
        }

        .section-title {
            color: var(--primary);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 26px;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 54px;
            height: 3px;
            background: var(--secondary);
            margin: 10px auto 0;
            border-radius: 999px;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-item {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 20px;
            background: #fff;
        }

        .result-bar {
            position: absolute;
            inset: 0 auto 0 0;
            width: 0;
            background: linear-gradient(90deg, rgba(191, 219, 254, 0.7), rgba(59, 130, 246, 0.16));
        }

        .result-inner {
            position: relative;
            z-index: 1;
        }

        .result-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
        }

        .result-label {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .rank-badge,
        .theme-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .rank-badge {
            min-width: 56px;
            height: 30px;
            background: #eff6ff;
            color: var(--secondary);
            font-size: 0.85rem;
        }

        .theme-number {
            width: 30px;
            height: 30px;
            background: var(--secondary);
            color: #fff;
            font-size: 0.85rem;
        }

        .theme-title {
            color: var(--primary);
            font-size: 1.05rem;
            font-weight: 800;
        }

        .vote-stats {
            text-align: right;
            flex-shrink: 0;
        }

        .vote-count {
            display: block;
            color: var(--secondary);
            font-size: 1.7rem;
            font-weight: 900;
            line-height: 1;
        }

        .vote-share {
            display: block;
            margin-top: 4px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .theme-details {
            margin: 0;
            padding-left: 22px;
            color: var(--text-main);
            font-size: 0.93rem;
        }

        .theme-details li + li { margin-top: 4px; }

        .theme-note {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .footer-note {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.86rem;
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .hero {
                padding: 44px 16px 40px;
                border-radius: 0 0 24px 24px;
            }

            .hero h1 { font-size: 1.7rem; }
            .section { padding: 22px; }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .result-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .vote-stats {
                text-align: left;
            }

            .result-label {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="subtitle">With.</div>
        <h1>AIワークショップ投票 受付終了</h1>
        <p class="hero-copy">投票は締め切りました。ご参加ありがとうございました。以下に最終集計結果を掲載しています。</p>
    </header>

    <main class="container">
        <section class="section closing-card">
            <div class="eyebrow">Voting Closed</div>
            <h2>投票受付は終了しました</h2>
            <p>2026年3月13日で投票を締め切りました。現在は結果表示のみで、投票はできません。</p>
            <div class="summary-grid">
                <div class="summary-box">
                    <span>総投票数</span>
                    <strong id="total-votes">23票</strong>
                </div>
                <div class="summary-box">
                    <span>最終反映日時</span>
                    <strong>2026-03-08 21:30 JST</strong>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">最終集計結果</h2>
            <div id="result-list" class="result-list"></div>
        </section>

        <p class="footer-note">今後の開催テーマは、この結果をもとに検討します。</p>
    </main>

    <script>
        const results = [
            {
                id: 1,
                title: "ChatGPTなどを仕事の相棒として使う",
                details: [
                    "ChatGPT / Gemini / Claude",
                    "メモリー機能",
                    "プロジェクト管理",
                    "AIを公私問わない思考パートナーにする方法",
                    "参考：法人営業とは何か? 営業ではどうAIを使うのか。"
                ],
                note: "AIを特定の事のみに使うのではなく、「相棒としてどう育てるか」についてお話します。また、ニーズがあれば法人営業についても少しお話しできればと思います。",
                votes: 4
            },
            {
                id: 2,
                title: "AIでツールを作る",
                details: [
                    "AIでの簡易ツール開発",
                    "バイブコーディング",
                    "簡易ツールを大きくしていく"
                ],
                note: "ワークショップでは実際に皆さんでツールを作る体験ができればと考えています。",
                votes: 11
            },
            {
                id: 3,
                title: "AI開発の世界を覗く",
                details: [
                    "VS Code",
                    "Cursor",
                    "GitHub",
                    "AI駆動開発の基本"
                ],
                note: "非エンジニアでも理解できる、ソフトウェア開発の世界観を理解することを目的とします。",
                votes: 7
            },
            {
                id: 4,
                title: "企業でのAI導入とMS Copilot",
                details: [
                    "MS Copilotって実際使えるの？",
                    "企業のセキュリティ（AI懸念）について",
                    "中規模企業でのAI導入"
                ],
                note: "会社員が使うAIの現実解としてのCopilot活用のススメと、その導入アプローチをご紹介します。",
                votes: 1
            }
        ];

        const totalVotes = results.reduce(function (sum, item) {
            return sum + item.votes;
        }, 0);

        const sortedResults = results.slice().sort(function (a, b) {
            return b.votes - a.votes || a.id - b.id;
        });

        document.getElementById('total-votes').textContent = totalVotes + '票';
        document.getElementById('result-list').innerHTML = sortedResults.map(function (item, index) {
            const share = totalVotes === 0 ? 0 : (item.votes / totalVotes) * 100;
            const detailsHtml = item.details.map(function (detail) {
                return '<li>' + detail + '</li>';
            }).join('');

            return (
                '<article class="result-item">' +
                    '<div class="result-bar" style="width:' + share.toFixed(1) + '%"></div>' +
                    '<div class="result-inner">' +
                        '<div class="result-head">' +
                            '<div class="result-label">' +
                                '<span class="rank-badge">' + (index + 1) + '位</span>' +
                                '<span class="theme-number">' + item.id + '</span>' +
                                '<div class="theme-title">' + item.title + '</div>' +
                            '</div>' +
                            '<div class="vote-stats">' +
                                '<span class="vote-count">' + item.votes + '</span>' +
                                '<span class="vote-share">得票率 ' + share.toFixed(1) + '%</span>' +
                            '</div>' +
                        '</div>' +
                        '<ul class="theme-details">' + detailsHtml + '</ul>' +
                        '<p class="theme-note">' + item.note + '</p>' +
                    '</div>' +
                '</article>'
            );
        }).join('');
    </script>
</body>
</html>
